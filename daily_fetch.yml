name: Daily Sentiment Data Fetch

on:
  schedule:
    # 每天 22:00 UTC = 台北時間 06:00
    # 在 ChatGPT Task 跑報告前先備好數據
    - cron: '0 22 * * *'
  workflow_dispatch: # 允許手動觸發

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests pytrends

      - name: Run fetch script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_data.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily_data.json
          git diff --staged --quiet || git commit -m "data: $(date -u +%Y-%m-%d)"
          git push
